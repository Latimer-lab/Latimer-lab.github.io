<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Santrez — Discover Opportunities</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="topbar">
    <span class="logo">Santrez</span>
    <form class="search-bar" id="search-form" role="search">
      <span class="search-icon" aria-hidden="true">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <circle cx="11" cy="11" r="7"></circle>
          <path d="M20 20l-3.5-3.5"></path>
        </svg>
      </span>
      <input type="search" class="search-input" id="search-input" placeholder="What do you want to play?" autocomplete="off" />
      <button type="submit" class="search-submit" aria-label="Search">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M5 12h14M13 6l6 6-6 6"></path>
        </svg>
      </button>
    </form>
    <button type="button" class="profile-btn" aria-label="Profile"></button>
  </header>

  <main class="browser">
    <div class="hero-title">
      <h1>Discover<br />Opportunities</h1>
    </div>
    <div class="columns-area">
      <div class="column-viewport" id="column-viewport">
        <div class="column-track" id="column-track"></div>
      </div>
    </div>
  </main>

  <div class="overlay hidden" id="overlay"></div>
  <aside class="panel hidden" id="panel">
    <div class="panel-resize" id="panel-resize" aria-hidden="true"></div>
    <div class="panel-header">
      <div class="panel-header-text">
        <p class="panel-breadcrumb" id="panel-breadcrumb"></p>
        <h2 class="panel-title" id="panel-title"></h2>
      </div>
      <button class="panel-close" id="panel-close" aria-label="Close panel">&times;</button>
    </div>

    <div class="panel-stats" id="panel-stats"></div>

    <div class="panel-table-wrap">
      <table class="panel-table" id="panel-table">
        <thead>
          <tr id="panel-thead-row"></tr>
        </thead>
        <tbody id="panel-tbody"></tbody>
      </table>
    </div>
  </aside>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
